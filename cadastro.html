<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Delícias da Paty</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>
    <!-- Cabeçalho -->
    <header>
        <h2>
            Delícias da Paty
        </h2>
        <nav>
            <a href="./index.html">Início</a>
            <a href="./categorias.html">Produtos</a>
            <a href="./">Sobre nós</a>
            <a href="./">Contato</a>
            <a href="./login.html">
                <img src="./icons/user.png" alt="login">
            </a>
            <a href="./encomendas.html">
                <img src="./icons/bag.png" alt="sacola">
            </a>
        </nav>
    </header>
    <hr>
    <!-- Área principal -->
    <main>
        <section class="area-cadastro">
            <h1>
                Cadastre-se
            </h1>
            <p>
                Cadastre-se e acompanhe seus pedidos e benefícios exclusivos.
            </p>
            <div class="cartao-cadastro">
                <form id="formulario-cadastro">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
 
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>

                    <label for="celular">Celular</label>
                    <input type="tel" id="celular" placeholder="(11) 99999-9999" required>

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>

                    <label for="confirmar-senha">
                        Confirmar senha
                    </label>

                    <input type="password" id="confirmar-senha" placeholder="Confirme sua senha" required>

                    <button type="submit" class="botao-cadastrar">
                        Cadastrar
                    </button>
                </form>
            </div>
            <a href="login.html" class="link-login">
                ← Voltar para Login
            </a>
        </section>
    </main>
    <script src="cadastro.js"></script>
</body>

</html>
