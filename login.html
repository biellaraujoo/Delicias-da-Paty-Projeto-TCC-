<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delícias da Paty</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>
    <!-- Cabeçalho do site -->
    <header>
        <h2>
            Delícias da Paty
        </h2>
        <nav>
            <a href="./index.html">Início</a>
            <a href="./categorias.html">Produtos</a>
            <a href="./">Sobre nós</a>
            <a href="./">Contato</a>
            <a href="./login.html">
                <img src="./icons/user.png" alt="login">
            </a>
            <a href="./encomendas.html">
                <img src="./icons/bag.png" alt="sacola">
            </a>
        </nav>
    </header>
    <hr>
    <!-- Área principal -->
    <main>
        <section class="area-login">
            <h1>
                Acesse sua Conta
            </h1>
            <p>
                Entre para acompanhar seus pedidos e ganhar benefícios exclusivos.
            </p>
            <div class="cartao-login">
                <div class="grupo-botoes">
                    <button id="botao-login">
                        Login
                    </button>
                    <a href="./cadastro.html">
                        <button id="botao-cadastro">
                            Cadastre-se
                        </button>
                    </a>
                </div>
                <form>
                    <label>E-mail</label>
                    <input type="email">
                    <label>Senha</label>
                    <input type="password">
                    <a href="./esqueci.html">Esqueci minha senha</a>
                    <button class="botao-entrar">
                        Entrar
                    </button>
                </form>
            </div>
        </section>
    </main>
    <!-- Rodapé -->
    <footer>
        <p>
            © Delícias da Paty. Todos os direitos reservados.
        </p>
    </footer>

    <script src="login.js"></script>

</body>

</html>
