<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encomendas - Delícias da Paty</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="encomendas.css">
    <link rel="stylesheet" href="media.css">
</head>
<script>
// Espera a página carregar completamente antes de rodar o código
window.addEventListener('DOMContentLoaded', () => {
    
    const botao = document.querySelector('.botao-encomendar');
    const formulario = document.getElementById('formulario-encomenda');

    if (botao) {
        botao.addEventListener('click', function() {
            // Verifica se o formulário está preenchido corretamente
            if (formulario.checkValidity()) {
                const nomeCliente = document.getElementById('nome-cliente').value;
                
                // Dispara o alerta!
                alert(`🎉 Obrigado, ${nomeCliente}! Sua encomenda foi registrada. A Paty entrará em contato com você via WhatsApp em breve.`);
                
                formulario.reset(); // Limpa os campos
            } else {
                // Força o navegador a mostrar qual campo está vazio
                formulario.reportValidity();
            }
        });
    } else {
        console.error("Botão '.botao-encomendar' não foi encontrado na página.");
    }
});
</script>

<body>
    <!-- Cabeçalho -->
    <div class="header-">
      <a href="encomendas.html"><img src="./imagens/bag (2).png" width="40px"></a>
    </div>
    <header class="barra-navegacao">
        <div class="container-logo">
            <span class="texto-logo"><img src="./imagens/logo.png" width="280px"><!-- Delícias da Paty--></span>
        </div>
        <nav class="menu-navegacao">
            <a href="index.html">Home</a>
            <a href="cardapio.html">Produtos</a>
            <a href="historia.html">Sobre nós</a>
            <a href="duvida.html">Contato</a>
        </nav>
    </header>
    <hr>
    <!-- Conteúdo principal -->
    <main>
        <section class="area-encomenda">
            <h1>
                Faça sua Encomenda
            </h1>
            <p>
                Preencha os campos abaixo para solicitar sua encomenda.
            </p>
            <div class="cartao-encomenda">
                <form id="formulario-encomenda">
                    <label for="nome-cliente">
                        Nome
                    </label>
                    <input type="text" id="nome-cliente" placeholder="Digite seu nome" required>
                    <label for="telefone-cliente">
                        Telefone
                    </label>
                    <input type="tel" id="telefone-cliente" placeholder="(11) 99999-9999" required>
                    <label for="produto-encomendado">
                        Produto
                    </label>
                    <input type="text" id="produto-encomendado" placeholder="Ex: Bolo de Chocolate" required>
                    <label for="quantidade-produto">
                        Quantidade
                    </label>
                    <input type="number" id="quantidade-produto"  min="1" required>
                    <label for="data-entrega">
                        Data da entrega
                    </label>
                    <input type="date" id="data-entrega" required>
                 
                    </div>
                    <button type="submit" class="botao-encomendar">
                        Enviar Encomenda
                    </button>
                </form>
            </div>
            <br>
            <br>
            <br>
             <a href="index.html" class="link-login">
                ← Voltar para página inicial
            </a>
        </section>
    </main>
    <script src="encomendas.js"></script>
</body>

</html>
