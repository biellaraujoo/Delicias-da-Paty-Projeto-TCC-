<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encomendas - Delícias da Paty</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="encomendas.css">
</head>

<body>
    <!-- Cabeçalho -->
    <header>
        <h2>
            Delícias da Paty
        </h2>
        <nav>
            <a href="./index.html">Início</a>
            <a href="./categorias.html">Produtos</a>
            <a href="./">Sobre nós</a>
            <a href="./">Contato</a>
            <a href="./login.html">
                <img src="./icons/user.png" alt="login">
            </a>
            <a href="./encomendas.html">
                <img src="./icons/bag.png" alt="sacola">
            </a>
        </nav>
    </header>
    <hr>
    <!-- Conteúdo principal -->
    <main>
        <section class="area-encomenda">
            <h1>
                Faça sua Encomenda
            </h1>
            <p>
                Preencha os campos abaixo para solicitar sua encomenda.
            </p>
            <div class="cartao-encomenda">
                <form id="formulario-encomenda">
                    <label for="nome-cliente">
                        Nome
                    </label>
                    <input type="text" id="nome-cliente" placeholder="Digite seu nome" required>
                    <label for="telefone-cliente">
                        Telefone
                    </label>
                    <input type="tel" id="telefone-cliente" placeholder="(11) 99999-9999" required>
                    <label for="produto-encomendado">
                        Produto
                    </label>
                    <input type="text" id="produto-encomendado" placeholder="Ex: Bolo de Chocolate" required>
                    <label for="quantidade-produto">
                        Quantidade
                    </label>
                    <input type="number" id="quantidade-produto" min="1" required>
                    <label for="data-entrega">
                        Data da entrega
                    </label>
                    <input type="date" id="data-entrega" required>

                    <!-- Dados do cartão -->

                    <h3 class="titulo-cartao">
                        Dados do Cartão
                    </h3>
                    <label for="nome-cartao">
                        Nome impresso no cartão
                    </label>
                    <input type="text" id="nome-cartao" placeholder="Nome completo" required>
                    <label for="numero-cartao">
                        Número do cartão
                    </label>
                    <input type="text" id="numero-cartao" placeholder="0000 0000 0000 0000" maxlength="19" required>
                    <div class="linha-cartao">
                        <div class="campo-cartao">
                            <label for="validade-cartao">
                                Validade
                            </label>
                            <input type="text" id="validade-cartao" placeholder="MM/AA" maxlength="5" required>
                        </div>
                        <div class="campo-cartao">
                            <label for="codigo-seguranca">
                                CVV
                            </label>
                            <input type="password" id="codigo-seguranca" placeholder="123" maxlength="3" required>
                        </div>
                    </div>
                    <button type="submit" class="botao-encomendar">
                        Enviar Encomenda
                    </button>
                </form>
            </div>
        </section>
    </main>
    <script src="encomendas.js"></script>
</body>

</html>
