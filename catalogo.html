<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Delícias da Paty</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="catalogo.css">
</head>

<body>
    <!-- Cabeçalho -->
    <header>
        <h2>
            Delícias da Paty
        </h2>
        <nav>
            <a href="./index.html">Início</a>
            <a href="./categorias.html">Produtos</a>
            <a href="./">Sobre nós</a>
            <a href="./">Contato</a>
            <a href="./login.html">
                <img src="./icons/user.png" alt="login">
            </a>
            <a href="./encomendas.html">
                <img src="./icons/bag.png" alt="sacola">
            </a>
        </nav>
    </header>
    <hr>
    <!-- Conteúdo principal -->
    <main>
        <section class="area-catalogo">
            <h1>
                Os Melhores !!
            </h1>
            <p>
                Confira alguns dos produtos disponíveis para encomenda.
            </p>
            <div class="grade-produtos">
                <!-- Produto 1 -->
                <div class="cartao-produto">
                    <img src="./imagens/bolo choco.jpeg" alt="Bolo de Chocolate">
                    <h3>
                        Bolo de Chocolate
                    </h3>
                    <p>R$ 70,00</p>
                    <a href="./encomendas.html">
                        <button class="botao-produto">
                            Encomendar
                        </button>
                    </a>
                </div>
                <!-- Produto 2 -->
                <div class="cartao-produto">
                    <img src="./imagens/briga gour.jpeg" alt="Brigadeiro-Gourmet">
                    <h3>Brigadeiro Gourmet</h3>
                    <p>R$ 3,50 unidade</p>
                    <a href="./encomendas.html">
                        <button class="botao-produto">
                            Encomendar
                        </button>
                    </a>
                </div>
                <!-- Produto 3 -->
                <div class="cartao-produto">
                    <img src="./imagens/cupcake 1.jpeg" alt="Cupcake">
                    <h3>Cupcake</h3>
                    <p>R$ 8,00 unidade</p>
                    <a href="./encomendas.html">
                        <button class="botao-produto">
                            Encomendar
                        </button>
                    </a>
                </div>
                <!-- Produto 4 -->
                <div class="cartao-produto">
                    <img src="./imagens/morango.jpeg" alt="Torta de Morango">
                    <h3>
                        Torta de Morango
                    </h3>
                    <p>
                        R$ 90,00
                    </p>
                    <a href="./encomendas.html">
                        <button class="botao-produto">
                            Encomendar
                        </button>
                    </a>
                </div>
            </div>
        </section>
    </main>
    <script src="catalogo.js"></script>
</body>

</html>
